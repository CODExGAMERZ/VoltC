name: voltc
version: '1.0.1'
summary: VoltC C programming IDE
description: |
  VoltC is a modern, lightweight C programming environment specifically
  engineered for students and beginners. Built on top of FastAPI
  and Monaco Editor, it features isolated compilation, live output streams,
  and variable memory map visualizers.
grade: stable
confinement: classic
base: core24

parts:
  voltc:
    plugin: nil
    source: .
    override-build: |
      # Install build dependencies in a virtual environment with system site packages
      # to inherit system GObject (GTK/WebKit) python bindings
      python3 -m venv --system-site-packages venv
      # Install dependencies using locally downloaded wheels if available
      if [ -d "wheels" ]; then
        echo "Found local wheels directory, installing offline..."
        ./venv/bin/pip install --no-index --find-links=wheels/ --upgrade pip
        ./venv/bin/pip install --no-index --find-links=wheels/ pyinstaller fastapi uvicorn websockets pywebview pydantic
      else
        echo "Local wheels directory not found, installing from PyPI..."
        ./venv/bin/pip install --upgrade pip
        ./venv/bin/pip install pyinstaller fastapi uvicorn websockets pywebview pydantic
      fi
      # Build the standalone binary
      ./venv/bin/python scripts/build_backend.py
      # Install into snap structure
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin
      cp dist/voltc-backend $SNAPCRAFT_PART_INSTALL/bin/voltc
    build-packages:
      - python3-pip
      - python3-setuptools
      - python3-dev
      - python3-venv
      - python3-gi
      - python3-gi-cairo
      - python3-webview
      - gir1.2-gtk-3.0
      - gir1.2-webkit2-4.1
    stage-packages:
      - python3-webview
      - gcc
      - clangd
      - gir1.2-webkit2-4.1

apps:
  voltc:
    command: bin/voltc
    extensions: [gnome]
    plugs:
      - home
      - network
      - network-bind
